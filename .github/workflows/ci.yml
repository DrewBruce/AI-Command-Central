name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify report workflows
        run: npm run test:reports

      - name: Test Rust backend
        working-directory: src-tauri
        run: cargo test
