<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workflow execution loop</title>
  <desc id="desc">A graph showing how a prompt moves through council seats, provider routing, validation, and local report generation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A0E"/>
      <stop offset="1" stop-color="#101720"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#5FD2E8"/>
    </marker>
  </defs>

  <rect width="1400" height="760" rx="28" fill="url(#bg)"/>
  <circle cx="140" cy="60" r="260" fill="#5FD2E8" opacity="0.08"/>
  <circle cx="1230" cy="710" r="240" fill="#72D39B" opacity="0.08"/>
  <text x="64" y="82" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="850">Workflow execution, without the mystery box</text>
  <text x="64" y="120" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Every seat has a role, a runner, a scope, and a recorded output.</text>

  <g stroke="#5FD2E8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.78">
    <path d="M214 332H342"/>
    <path d="M492 332H620"/>
    <path d="M770 332H898"/>
    <path d="M1048 332H1176"/>
    <path d="M732 470V558"/>
    <path d="M732 226V172"/>
  </g>
  <g stroke="#91A7FF" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.65">
    <path d="M492 352C552 438 632 466 702 466"/>
    <path d="M898 352C838 438 758 466 702 466"/>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(58 252)">
      <rect width="156" height="160" rx="16" fill="#101720" stroke="#243241"/>
      <text x="24" y="42" fill="#9CE6F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850">INPUT</text>
      <text x="24" y="76" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Brief</text>
      <text x="24" y="104" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Question</text>
      <text x="24" y="128" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Project context</text>
    </g>

    <g transform="translate(342 252)">
      <rect width="150" height="160" rx="16" fill="#101720" stroke="#5FD2E8" stroke-opacity="0.45"/>
      <text x="24" y="42" fill="#5FD2E8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850">READ</text>
      <text x="24" y="76" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Scanner</text>
      <text x="24" y="104" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Signals</text>
      <text x="24" y="128" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Read-only</text>
    </g>

    <g transform="translate(620 252)">
      <rect width="150" height="160" rx="16" fill="#101720" stroke="#F3C55C" stroke-opacity="0.45"/>
      <text x="24" y="42" fill="#F3C55C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850">REVIEW</text>
      <text x="24" y="76" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Critic</text>
      <text x="24" y="104" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Risks</text>
      <text x="24" y="128" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Caveats</text>
    </g>

    <g transform="translate(898 252)">
      <rect width="150" height="160" rx="16" fill="#101720" stroke="#91A7FF" stroke-opacity="0.45"/>
      <text x="24" y="42" fill="#91A7FF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850">SYNTHESIS</text>
      <text x="24" y="76" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Chair</text>
      <text x="24" y="104" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Tradeoffs</text>
      <text x="24" y="128" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Decision shape</text>
    </g>

    <g transform="translate(1176 252)">
      <rect width="160" height="160" rx="16" fill="#101720" stroke="#72D39B" stroke-opacity="0.45"/>
      <text x="24" y="42" fill="#72D39B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850">DECIDE</text>
      <text x="24" y="76" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Judge</text>
      <text x="24" y="104" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Verdict</text>
      <text x="24" y="128" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Next action</text>
    </g>
  </g>

  <g transform="translate(474 548)">
    <rect width="516" height="120" rx="18" fill="#0B1016" stroke="#243241"/>
    <text x="28" y="38" fill="#9CE6F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="850">TERMINAL SEAT</text>
    <text x="28" y="72" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="27" font-weight="850">Local Report Writer</text>
    <text x="28" y="100" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Assembles run.json, manifest, markdown, and HTML without streaming bulky documents through a model.</text>
  </g>

  <g transform="translate(512 130)">
    <rect width="440" height="86" rx="16" fill="#0B1016" stroke="#243241"/>
    <text x="24" y="34" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="850">Provider routing</text>
    <text x="24" y="62" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Codex CLI, Claude CLI, Ollama, Apple Foundation Models, or demo runner.</text>
  </g>
</svg>
