      <text x="22" y="39" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">run.json</text>
    </g>
    <g transform="translate(32 166)">
      <rect width="310" height="62" rx="12" fill="#101720" stroke="#72D39B" stroke-opacity="0.32"/>
      <text x="22" y="39" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">report_manifest.json</text>
    </g>
    <g transform="translate(32 244)">
      <rect width="310" height="62" rx="12" fill="#101720" stroke="#72D39B" stroke-opacity="0.32"/>
      <text x="22" y="39" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">report.md</text>
    </g>
    <g transform="translate(32 322)">
      <rect width="310" height="62" rx="12" fill="#101720" stroke="#72D39B" stroke-opacity="0.32"/>
      <text x="22" y="39" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">report.html</text>
    </g>
  </g>

  <g transform="translate(248 620)">
    <rect width="904" height="70" rx="18" fill="#101720" stroke="#243241"/>
    <text x="28" y="43" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">Rule of thumb: model seats produce bounded structured content; local tools own durable files, reports, and auditability.</text>
