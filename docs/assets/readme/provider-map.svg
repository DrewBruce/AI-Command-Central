<svg width="1400" height="740" viewBox="0 0 1400 740" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Model provider and report artifact map</title>
  <desc id="desc">A diagram of provider choices and resulting local report artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A0E"/>
      <stop offset="1" stop-color="#101720"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#5FD2E8"/>
    </marker>
  </defs>
  <rect width="1400" height="740" rx="28" fill="url(#bg)"/>
  <text x="68" y="86" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="850">Choose the right runner for each seat</text>
  <text x="68" y="124" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">High-trust orchestration comes from explicit provider routing and bounded local assembly.</text>

  <g transform="translate(74 190)">
    <rect width="360" height="378" rx="22" fill="#0B1016" stroke="#243241"/>
    <text x="32" y="50" fill="#9CE6F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="850">LIVE MODEL SEATS</text>
    <g transform="translate(32 86)">
      <rect width="296" height="56" rx="12" fill="#101720" stroke="#5FD2E8" stroke-opacity="0.32"/>
      <text x="20" y="35" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Codex CLI</text>
    </g>
    <g transform="translate(32 158)">
      <rect width="296" height="56" rx="12" fill="#101720" stroke="#91A7FF" stroke-opacity="0.32"/>
      <text x="20" y="35" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Claude CLI</text>
    </g>
    <g transform="translate(32 230)">
      <rect width="296" height="56" rx="12" fill="#101720" stroke="#72D39B" stroke-opacity="0.32"/>
      <text x="20" y="35" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Ollama / LM Studio</text>
    </g>
    <g transform="translate(32 302)">
      <rect width="296" height="56" rx="12" fill="#101720" stroke="#F3C55C" stroke-opacity="0.32"/>
      <text x="20" y="35" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Apple Foundation Models</text>
    </g>
  </g>

  <g stroke="#5FD2E8" stroke-width="4" marker-end="url(#arrow)" opacity="0.72">
    <path d="M454 378H584"/>
    <path d="M820 378H950"/>
  </g>

  <g transform="translate(584 254)">
    <rect width="236" height="248" rx="22" fill="#101720" stroke="#5FD2E8" stroke-opacity="0.42"/>
    <text x="32" y="50" fill="#9CE6F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="850">RUNNER CORE</text>
    <text x="32" y="92" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="850">Seat execution</text>
    <text x="32" y="126" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Prompt shape</text>
    <text x="32" y="154" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Prior seat context</text>
    <text x="32" y="182" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Cancellation token</text>
    <text x="32" y="210" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Progress events</text>
  </g>

  <g transform="translate(950 190)">
    <rect width="374" height="378" rx="22" fill="#0B1016" stroke="#243241"/>
    <text x="32" y="50" fill="#72D39B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="850">LOCAL OUTPUTS</text>
