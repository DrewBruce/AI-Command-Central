<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Safety guardrails</title>
  <desc id="desc">A guardrail diagram showing inspect-only scanning, explicit confirmation for writes, provider readiness, and artifact history.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A0E"/>
      <stop offset="1" stop-color="#101720"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#72D39B"/>
      <stop offset="1" stop-color="#5FD2E8"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="88" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="850">Built around conservative automation</text>
  <text x="70" y="126" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">The app makes automation visible, bounded, and reviewable before agents touch real work.</text>

  <g transform="translate(92 206)">
    <path d="M150 0 280 48V168C280 260 226 329 150 366C74 329 20 260 20 168V48L150 0Z" fill="url(#shield)" opacity="0.15" stroke="#72D39B" stroke-opacity="0.48" stroke-width="3"/>
    <path d="M99 174 137 212 213 122" stroke="#72D39B" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="66" y="430" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="850">Guardrail core</text>
    <text x="24" y="464" fill="#8293A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Read, review, then act only when the app has permission.</text>
  </g>

  <g transform="translate(464 202)">
    <rect width="360" height="98" rx="18" fill="#101720" stroke="#5FD2E8" stroke-opacity="0.35"/>
    <text x="24" y="38" fill="#9CE6F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="850">INSPECT-ONLY SCANS</text>
    <text x="24" y="68" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Detect project signals without reading secrets</text>

    <rect y="128" width="360" height="98" rx="18" fill="#101720" stroke="#F3C55C" stroke-opacity="0.35"/>
    <text x="24" y="166" fill="#F3C55C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="850">CONFIRMATION GATES</text>
    <text x="24" y="196" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Preview local writes before creating files</text>

    <rect y="256" width="360" height="98" rx="18" fill="#101720" stroke="#91A7FF" stroke-opacity="0.35"/>
    <text x="24" y="294" fill="#91A7FF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="850">RUNNER READINESS</text>
    <text x="24" y="324" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Show provider status before live runs</text>
  </g>

  <g transform="translate(902 202)">
    <rect width="360" height="98" rx="18" fill="#101720" stroke="#72D39B" stroke-opacity="0.35"/>
    <text x="24" y="38" fill="#72D39B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="850">LOCAL HISTORY</text>
    <text x="24" y="68" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Persist run outputs in SQLite and artifacts</text>

    <rect y="128" width="360" height="98" rx="18" fill="#101720" stroke="#FF7F7D" stroke-opacity="0.35"/>
    <text x="24" y="166" fill="#FF7F7D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="850">NO HIDDEN CLOUD STATE</text>
    <text x="24" y="196" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Keep context local unless explicitly routed</text>

    <rect y="256" width="360" height="98" rx="18" fill="#101720" stroke="#5FD2E8" stroke-opacity="0.35"/>
    <text x="24" y="294" fill="#9CE6F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="850">BOUNDED OUTPUT</text>
    <text x="24" y="324" fill="#EEF4F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="850">Models return content; tools assemble files</text>
  </g>

  <g transform="translate(464 608)">
    <rect width="798" height="52" rx="14" fill="#0B1016" stroke="#243241"/>
    <text x="24" y="34" fill="#C6D1DC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Designed for practical local agent work: visible scope, explicit runner choice, reviewable outputs, and conservative defaults.</text>
  </g>
</svg>
